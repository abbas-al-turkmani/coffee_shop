name: coffee_shop
description: "A Coffee Shop App to buy and delever coffee."
version: 1.0.0+1

environment:
  sdk: ^3.11.3
dependencies:
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_gen: ^5.13.0+1
  flutter_screenutil: ^5.9.3
  get_it: ^9.2.1
  iconly: ^1.0.1
  iconsax: ^0.0.8
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.5.5
  step_progress_indicator: ^1.0.2

dev_dependencies:
  flutter_gen_runner: ^5.13.0+1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  theme_tailor: ^3.1.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/env/api_links.env
  fonts:
    - family: sora
      fonts:
        - asset: assets/fonts/Sora/Sora-VariableFont_wght.ttf
        - asset: assets/fonts/Sora/static/Sora-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Sora/static/Sora-Bold.ttf
          weight: 700
        - asset: assets/fonts/Sora/static/Sora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sora/static/Sora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Sora/static/Sora-Regular.ttf
          weight: 400
        - asset: assets/fonts/Sora/static/Sora-Light.ttf
          weight: 300
        - asset: assets/fonts/Sora/static/Sora-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Sora/static/Sora-Thin.ttf
          weight: 100
